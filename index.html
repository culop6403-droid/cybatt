<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Cy-Batt">
<title>Cy-Batt</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --bg: #000;
  --bg2: #0a0a0a;
  --bg3: #111;
  --bg4: #1a1a1a;
  --bg5: #222;
  --text: #fff;
  --text2: rgba(255,255,255,0.55);
  --text3: rgba(255,255,255,0.25);
  --accent: #fff;
  --accent-dim: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.1);
  --border2: rgba(255,255,255,0.05);
  --pixel: 'Share Tech Mono', monospace;
  --body: 'Rajdhani', sans-serif;
  --nav-h: 72px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--body); }

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0; z-index: 999;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
  transition: opacity .5s;
}
#splash.hide { opacity: 0; pointer-events: none; }
#splash-logo { image-rendering: pixelated; }
#splash h1 { font-family: var(--pixel); font-size: 28px; letter-spacing: 4px; color: #fff; }
#splash p { font-family: var(--pixel); font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 2px; animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* ── LAYOUT ── */
#app {
  height: 100vh; width: 100%;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* ── MAIN AREA ── */
#main {
  flex: 1; overflow: hidden;
  position: relative;
  display: flex; flex-direction: column;
}

/* ── NOW PLAYING VIEW ── */
#view-player {
  flex: 1; display: flex; flex-direction: column;
  padding: 0; overflow: hidden;
  position: absolute; inset: 0;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
}
#view-player.hidden { transform: translateY(100%); }

/* Video / Art background */
#media-bg {
  position: absolute; inset: 0;
  background: #000;
  overflow: hidden;
}
#bg-video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: none;
  opacity: .35;
}
#bg-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
.pixel-art-bg {
  image-rendering: pixelated;
  opacity: .06;
  position: absolute;
  inset: 0; width: 100%; height: 100%;
}

/* Art cover */
#art-wrap {
  position: relative; z-index: 2;
  width: calc(100% - 3rem);
  max-width: 320px;
  aspect-ratio: 1;
  margin: 0 auto;
  margin-top: max(3.5rem, env(safe-area-inset-top, 3.5rem));
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg3);
  border: 1px solid var(--border);
  flex-shrink: 0;
}
#art-img { width: 100%; height: 100%; object-fit: cover; display: none; }
#art-default {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: #0a0a0a;
}

/* Track info */
#track-info {
  position: relative; z-index: 2;
  padding: 1.25rem 1.5rem .75rem;
  flex-shrink: 0;
}
#t-name {
  font-family: var(--body); font-size: 22px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: -.3px;
}
#t-sub { font-size: 14px; color: var(--text2); margin-top: 2px; font-weight: 500; }

/* Progress */
#prog-section {
  position: relative; z-index: 2;
  padding: 0 1.5rem;
  flex-shrink: 0;
}
#seek-wrap { position: relative; height: 20px; display: flex; align-items: center; cursor: pointer; }
#seek-track {
  position: absolute; left: 0; right: 0; height: 3px;
  background: rgba(255,255,255,0.15); border-radius: 2px;
}
#seek-fill {
  position: absolute; left: 0; height: 3px;
  background: #fff; border-radius: 2px;
  width: 0%; transition: width .1s linear;
}
#seek-thumb {
  position: absolute; width: 14px; height: 14px;
  background: #fff; border-radius: 50%;
  transform: translateX(-50%);
  left: 0%;
  box-shadow: 0 0 6px rgba(255,255,255,.4);
  transition: left .1s linear;
}
#seek-input {
  position: absolute; inset: 0; width: 100%; height: 100%;
  opacity: 0; cursor: pointer;
  -webkit-appearance: none; appearance: none;
}
#times { display: flex; justify-content: space-between; font-family: var(--pixel); font-size: 11px; color: var(--text3); margin-top: 4px; }

/* Controls */
#ctrl-section {
  position: relative; z-index: 2;
  padding: .75rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.ctrl-sm {
  background: none; border: none; cursor: pointer;
  color: var(--text2); padding: 8px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: color .15s;
}
.ctrl-sm:active { color: #fff; }
.ctrl-sm.on { color: #fff; }
.ctrl-sm svg { width: 22px; height: 22px; }
#pbtn {
  width: 64px; height: 64px;
  background: #fff; border: none; border-radius: 50%;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .1s, opacity .15s;
}
#pbtn:active { transform: scale(.92); opacity: .85; }
#pbtn svg { width: 28px; height: 28px; color: #000; }

/* Vol */
#vol-section {
  position: relative; z-index: 2;
  padding: 0 1.5rem .5rem;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
#vol-section svg { width: 16px; height: 16px; color: var(--text3); flex-shrink: 0; }
#vol-track { flex: 1; position: relative; height: 20px; display: flex; align-items: center; cursor: pointer; }
#vol-bg { position: absolute; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; }
#vol-fill { position: absolute; left: 0; height: 3px; background: rgba(255,255,255,0.5); border-radius: 2px; width: 100%; }
#vol-input { position: absolute; inset: 0; width: 100%; opacity: 0; cursor: pointer; -webkit-appearance: none; }

/* ── QUEUE VIEW ── */
#view-queue {
  position: absolute; inset: 0;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  overflow: hidden;
}
#view-queue.visible { transform: translateX(0); }

#queue-header {
  padding: max(3rem, env(safe-area-inset-top, 3rem)) 1.25rem 1rem;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border2);
  flex-shrink: 0;
}
#queue-header h2 { font-size: 18px; font-weight: 700; flex: 1; }
#queue-count { font-size: 13px; color: var(--text2); font-weight: 500; }
#close-queue {
  background: var(--bg4); border: none; cursor: pointer;
  color: var(--text); width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
#close-queue svg { width: 16px; height: 16px; }

#queue-list {
  flex: 1; overflow-y: auto; padding: .5rem 0;
  -webkit-overflow-scrolling: touch;
}
#queue-list::-webkit-scrollbar { display: none; }

.qi {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 1.25rem; cursor: pointer;
  transition: background .15s;
  border-left: 2px solid transparent;
}
.qi:active { background: var(--bg3); }
.qi.active { background: var(--bg3); border-left-color: #fff; }
.qi-num { font-family: var(--pixel); font-size: 12px; color: var(--text3); min-width: 20px; text-align: center; }
.qi-info { flex: 1; min-width: 0; }
.qi-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.qi.active .qi-name { color: #fff; }
.qi-meta { font-size: 12px; color: var(--text3); margin-top: 1px; }
.qi-del {
  background: none; border: none; cursor: pointer;
  color: var(--text3); padding: 6px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: color .15s;
}
.qi-del:active { color: #ff4444; }
.qi-del svg { width: 15px; height: 15px; }

#queue-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 200px; gap: 12px; color: var(--text3);
  font-family: var(--pixel); font-size: 12px; letter-spacing: 1px;
}

/* ── BOTTOM NAV ── */
#bottom-nav {
  height: var(--nav-h);
  padding-bottom: env(safe-area-inset-bottom, 0);
  background: rgba(0,0,0,0.95);
  border-top: 1px solid var(--border2);
  display: flex; align-items: center;
  position: relative; z-index: 10;
  flex-shrink: 0;
  backdrop-filter: blur(20px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; background: none; border: none; cursor: pointer;
  color: var(--text3); padding: 8px 4px;
  transition: color .15s;
  height: 100%;
}
.nav-btn.active { color: #fff; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-family: var(--pixel); font-size: 9px; letter-spacing: 1px; }

#add-btn {
  flex: 1.2;
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; color: #fff; padding: 8px 4px; height: 100%;
  position: relative;
}
#add-btn-inner {
  width: 44px; height: 44px;
  background: #fff; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: transform .1s;
}
#add-btn:active #add-btn-inner { transform: scale(.9); }
#add-btn-inner svg { width: 22px; height: 22px; color: #000; }
#add-btn span { font-family: var(--pixel); font-size: 9px; letter-spacing: 1px; color: var(--text3); }

#file-input { display: none; }

/* ── MINI NOW PLAYING (queue view) ── */
#mini-player {
  margin: 0 1rem .75rem;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; flex-shrink: 0;
}
#mini-name { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#mini-play {
  background: #fff; border: none; border-radius: 50%;
  width: 32px; height: 32px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
#mini-play svg { width: 14px; height: 14px; color: #000; }

/* ── LOADING OVERLAY ── */
#loading {
  position: fixed; inset: 0; z-index: 998;
  background: rgba(0,0,0,0.8);
  display: none; align-items: center; justify-content: center;
  font-family: var(--pixel); font-size: 12px; letter-spacing: 2px;
  color: rgba(255,255,255,0.5);
}
#loading.visible { display: flex; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg4); border: 1px solid var(--border);
  color: #fff; font-family: var(--pixel); font-size: 11px; letter-spacing: 1px;
  padding: 8px 16px; border-radius: 20px; white-space: nowrap;
  opacity: 0; transition: all .3s; pointer-events: none; z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="splash">
  <svg id="splash-logo" width="80" height="80" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
    <rect width="16" height="16" fill="#000"/>
    <rect x="4" y="1" width="8" height="1" fill="#fff"/>
    <rect x="3" y="2" width="10" height="1" fill="#fff"/>
    <rect x="2" y="3" width="2" height="4" fill="#fff"/>
    <rect x="12" y="3" width="2" height="4" fill="#fff"/>
    <rect x="4" y="3" width="8" height="6" fill="#ddd"/>
    <rect x="5" y="5" width="2" height="2" fill="#000"/>
    <rect x="9" y="5" width="2" height="2" fill="#000"/>
    <rect x="5" y="5" width="1" height="1" fill="#fff"/>
    <rect x="9" y="5" width="1" height="1" fill="#fff"/>
    <rect x="6" y="8" width="4" height="1" fill="#000"/>
    <rect x="5" y="7" width="1" height="1" fill="#000"/>
    <rect x="10" y="7" width="1" height="1" fill="#000"/>
    <rect x="6" y="9" width="4" height="2" fill="#ddd"/>
    <rect x="3" y="11" width="10" height="4" fill="#fff"/>
    <rect x="1" y="12" width="2" height="3" fill="#fff"/>
    <rect x="13" y="12" width="2" height="3" fill="#fff"/>
    <rect x="3" y="3" width="1" height="6" fill="#fff"/>
    <rect x="12" y="3" width="1" height="6" fill="#fff"/>
  </svg>
  <h1>CY-BATT</h1>
  <p>CARGANDO...</p>
</div>

<div id="loading">PROCESANDO...</div>
<div id="toast"></div>

<div id="app">
  <div id="main">

    <div id="view-player">
      <div id="media-bg">
        <video id="bg-video" playsinline webkit-playsinline muted></video>
        <svg class="pixel-art-bg" viewBox="0 0 32 32" preserveAspectRatio="xMidYMid slice">
          <defs><pattern id="pg" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse"><rect x="0" y="0" width="1" height="1" fill="#fff"/></pattern></defs>
          <rect width="32" height="32" fill="url(#pg)"/>
        </svg>
      </div>

      <div id="art-wrap">
        <img id="art-img" alt="Portada">
        <div id="art-default">
          <svg width="80" height="80" viewBox="0 0 16 16" style="image-rendering:pixelated;opacity:.4">
            <rect x="4" y="1" width="8" height="1" fill="#fff"/>
            <rect x="3" y="2" width="10" height="1" fill="#fff"/>
            <rect x="2" y="3" width="2" height="4" fill="#fff"/>
            <rect x="12" y="3" width="2" height="4" fill="#fff"/>
            <rect x="4" y="3" width="8" height="6" fill="#aaa"/>
            <rect x="5" y="5" width="2" height="2" fill="#000"/>
            <rect x="9" y="5" width="2" height="2" fill="#000"/>
            <rect x="5" y="5" width="1" height="1" fill="#fff"/>
            <rect x="9" y="5" width="1" height="1" fill="#fff"/>
            <rect x="6" y="8" width="4" height="1" fill="#000"/>
            <rect x="5" y="7" width="1" height="1" fill="#000"/>
            <rect x="10" y="7" width="1" height="1" fill="#000"/>
            <rect x="6" y="9" width="4" height="2" fill="#aaa"/>
            <rect x="3" y="11" width="10" height="4" fill="#fff"/>
            <rect x="1" y="12" width="2" height="3" fill="#fff"/>
            <rect x="13" y="12" width="2" height="3" fill="#fff"/>
            <rect x="3" y="3" width="1" height="6" fill="#fff"/>
            <rect x="12" y="3" width="1" height="6" fill="#fff"/>
          </svg>
        </div>
      </div>

      <div id="track-info">
        <div id="t-name">SIN REPRODUCIR</div>
        <div id="t-sub">Agregá música para empezar</div>
      </div>

      <div id="prog-section">
        <div id="seek-wrap">
          <div id="seek-track"></div>
          <div id="seek-fill"></div>
          <div id="seek-thumb"></div>
          <input type="range" id="seek-input" min="0" value="0" step="0.1">
        </div>
        <div id="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
      </div>

      <div id="ctrl-section">
        <button class="ctrl-sm" id="shuf-btn" onclick="togShuf()" aria-label="Aleatorio">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="ctrl-sm" onclick="prev()" aria-label="Anterior">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><rect x="5" y="4" width="3" height="16"/></svg>
        </button>
        <button id="pbtn" onclick="togPlay()" aria-label="Play/Pausa">
          <svg id="ico-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
        <button class="ctrl-sm" onclick="next()" aria-label="Siguiente">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><rect x="16" y="4" width="3" height="16"/></svg>
        </button>
        <button class="ctrl-sm" id="rep-btn" onclick="togRep()" aria-label="Repetir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>

      <div id="vol-section">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
        <div id="vol-track">
          <div id="vol-bg"></div>
          <div id="vol-fill"></div>
          <input type="range" id="vol-input" min="0" max="1" step="0.02" value="1">
        </div>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
      </div>
    </div>

    <div id="view-queue">
      <div id="queue-header">
        <h2>Cola</h2>
        <span id="queue-count"></span>
        <button id="close-queue" onclick="showPlayer()" aria-label="Cerrar cola">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="mini-player" onclick="showPlayer()">
        <svg width="28" height="28" viewBox="0 0 16 16" style="image-rendering:pixelated;flex-shrink:0">
          <rect x="4" y="1" width="8" height="1" fill="#fff"/><rect x="3" y="2" width="10" height="1" fill="#fff"/>
          <rect x="2" y="3" width="2" height="4" fill="#fff"/><rect x="12" y="3" width="2" height="4" fill="#fff"/>
          <rect x="4" y="3" width="8" height="6" fill="#888"/>
          <rect x="5" y="5" width="2" height="2" fill="#000"/><rect x="9" y="5" width="2" height="2" fill="#000"/>
          <rect x="5" y="5" width="1" height="1" fill="#fff"/><rect x="9" y="5" width="1" height="1" fill="#fff"/>
          <rect x="6" y="8" width="4" height="1" fill="#000"/>
          <rect x="3" y="11" width="10" height="4" fill="#fff"/><rect x="1" y="12" width="2" height="3" fill="#fff"/><rect x="13" y="12" width="2" height="3" fill="#fff"/>
          <rect x="3" y="3" width="1" height="6" fill="#fff"/><rect x="12" y="3" width="1" height="6" fill="#fff"/>
        </svg>
        <span id="mini-name">Sin reproducir</span>
        <button id="mini-play" onclick="event.stopPropagation();togPlay()" aria-label="Play/Pausa">
          <svg id="mini-ico-play" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <svg id="mini-ico-pause" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        </button>
      </div>
      <div id="queue-list"></div>
    </div>

  </div>

  <div id="bottom-nav">
    <button class="nav-btn active" id="nav-player" onclick="showPlayer()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      <span>PLAYER</span>
    </button>

    <button id="add-btn" onclick="document.getElementById('file-input').click()" aria-label="Agregar música">
      <div id="add-btn-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <span>AGREGAR</span>
    </button>

    <button class="nav-btn" id="nav-queue" onclick="showQueue()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>COLA</span>
    </button>
  </div>
</div>

<input type="file" id="file-input" multiple accept="audio/*,video/*" onchange="addFiles(this.files)">

<script>
// ── STATE ──
let tracks = [], curIdx = -1, shuffle = false, repeat = false;
let audioCtx = null, sourceNode = null, gainNode = null;
const vid = document.getElementById('bg-video');
let DB;

// ── INDEXEDDB ──
function initDB(){
  return new Promise((res, rej) => {
    const req = indexedDB.open('CyBattDB', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains('tracks')){
        db.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = e => { DB = e.target.result; res(); };
    req.onerror = () => rej();
  });
}

function saveTrackToDB(track){
  return new Promise((res) => {
    const tx = DB.transaction('tracks','readwrite');
    const store = tx.objectStore('tracks');
    store.add({ name: track.name, isVideo: track.isVideo, blob: track.blob });
    tx.oncomplete = res;
    tx.onerror = res;
  });
}

function loadTracksFromDB(){
  return new Promise((res) => {
    const tx = DB.transaction('tracks','readonly');
    const store = tx.objectStore('tracks');
    const req = store.getAll();
    req.onsuccess = e => res(e.target.result || []);
    req.onerror = () => res([]);
  });
}

function deleteTrackFromDB(dbId){
  return new Promise((res) => {
    const tx = DB.transaction('tracks','readwrite');
    tx.objectStore('tracks').delete(dbId);
    tx.oncomplete = res;
  });
}

async function bootDB(){
  try {
    await initDB();
    const saved = await loadTracksFromDB();
    if(saved.length){
      saved.forEach(row => {
        const url = URL.createObjectURL(row.blob);
        tracks.push({ name: row.name, url, isVideo: row.isVideo, blob: row.blob, dbId: row.id });
      });
      renderQueue();
      load(0);
      toast(tracks.length + ' canciones cargadas');
    }
  } catch(e){ console.log('DB no disponible'); }
}

// ── ADD FILES ──
const VIDEO_EXTS = ['mp4','webm','mkv','mov','m4v'];

async function addFiles(files){
  showLoading(true);
  const arr = Array.from(files);
  for(const f of arr){
    const ext = f.name.split('.').pop().toLowerCase();
    const isVideo = f.type.startsWith('video/') || VIDEO_EXTS.includes(ext);
    const name = f.name.replace(/\.[^/.]+$/,'').replace(/[_\-]+/g,' ').trim();
    const url = URL.createObjectURL(f);
    const track = { name, url, isVideo, blob: f };
    tracks.push(track);
    try { await saveTrackToDB(track); } catch(e){}
  }
  showLoading(false);
  renderQueue();
  if(curIdx === -1) load(0);
  toast(arr.length + ' archivo' + (arr.length>1?'s':'') + ' agregado' + (arr.length>1?'s':''));
  document.getElementById('file-input').value = '';
}

// ── AUDIO ENGINE ──
function setupAudioContext(){
  if(audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.connect(audioCtx.destination);
  } catch(e){}
}

// ── LOAD TRACK ──
function load(idx){
  if(idx < 0 || idx >= tracks.length) return;
  curIdx = idx;
  const t = tracks[idx];

  vid.pause();
  vid.src = t.url;

  if(t.isVideo){
    document.getElementById('bg-video').style.display = 'block';
    document.getElementById('art-default').style.display = 'none';
  } else {
    document.getElementById('bg-video').style.display = 'none';
    document.getElementById('art-default').style.display = 'flex';
  }

  const playPromise = vid.play();
  if(playPromise) playPromise.then(()=>setPlay(true)).catch(()=>setPlay(false));

  document.getElementById('t-name').textContent = t.name.toUpperCase();
  document.getElementById('t-sub').textContent = (t.isVideo ? '▶ VIDEO' : '♪ AUDIO') + ' · ' + (idx+1) + '/' + tracks.length;
  document.getElementById('mini-name').textContent = t.name;
  document.getElementById('seek-input').value = 0;
  updateSeek(0,0);
  document.getElementById('cur').textContent = '0:00';
  document.getElementById('dur').textContent = '—';

  setupMediaSession(t);
  renderQueue();

  if(t.isVideo){
    vid.muted = false;
    vid.style.opacity = '.4';
  }
}

function setupMediaSession(t){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: t.name,
    artist: 'Cy-Batt',
    album: t.isVideo ? 'Video' : 'Audio',
    artwork: [{ src: buildLogoDataURL(), sizes: '192x192', type: 'image/png' }]
  });
  navigator.mediaSession.setActionHandler('play', ()=>{ vid.play(); setPlay(true); });
  navigator.mediaSession.setActionHandler('pause', ()=>{ vid.pause(); setPlay(false); });
  navigator.mediaSession.setActionHandler('previoustrack', prev);
  navigator.mediaSession.setActionHandler('nexttrack', next);
  try { navigator.mediaSession.setActionHandler('seekto', d=>{ vid.currentTime=d.seekTime; }); } catch(e){}
  try { navigator.mediaSession.setActionHandler('seekbackward', ()=>{ vid.currentTime=Math.max(0,vid.currentTime-10); }); } catch(e){}
  try { navigator.mediaSession.setActionHandler('seekforward', ()=>{ vid.currentTime=Math.min(vid.duration||0,vid.currentTime+10); }); } catch(e){}
}

function buildLogoDataURL(){
  const c = document.createElement('canvas');
  c.width = 192; c.height = 192;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,192,192);
  ctx.fillStyle = '#fff';
  ctx.imageSmoothingEnabled = false;
  const px = 12;
  const pixels = [
    [4,1,8,1],[3,2,10,1],[2,3,2,4],[12,3,2,4],
    [4,3,8,6],[5,5,2,2],[9,5,2,2],[6,8,4,1],[5,7,1,1],[10,7,1,1],
    [6,9,4,2],[3,11,10,4],[1,12,2,3],[13,12,2,3],
    [3,3,1,6],[12,3,1,6]
  ];
  pixels.forEach(([x,y,w,h])=>{ ctx.fillRect(x*px,y*px,w*px,h*px); });
  ctx.fillStyle = '#aaa';
  ctx.fillRect(4*px,3*px,8*px,6*px);
  ctx.fillRect(6*px,9*px,4*px,2*px);
  ctx.fillStyle = '#000';
  ctx.fillRect(5*px,5*px,2*px,2*px);
  ctx.fillRect(9*px,5*px,2*px,2*px);
  ctx.fillRect(6*px,8*px,4*px,px);
  ctx.fillRect(5*px,7*px,px,px);
  ctx.fillRect(10*px,7*px,px,px);
  ctx.fillStyle = '#fff';
  ctx.fillRect(5*px,5*px,px,px);
  ctx.fillRect(9*px,5*px,px,px);
  return c.toDataURL('image/png');
}

// ── PLAYBACK CONTROLS ──
function setPlay(p){
  document.getElementById('ico-play').style.display = p ? 'none' : '';
  document.getElementById('ico-pause').style.display = p ? '' : 'none';
  document.getElementById('mini-ico-play').style.display = p ? 'none' : '';
  document.getElementById('mini-ico-pause').style.display = p ? '' : 'none';
  if('mediaSession' in navigator){
    navigator.mediaSession.playbackState = p ? 'playing' : 'paused';
  }
}

function togPlay(){
  if(!tracks.length){ toast('Agregá música primero'); return; }
  if(vid.paused){ vid.play(); setPlay(true); }
  else { vid.pause(); setPlay(false); }
}

// ... (Las demás funciones se mantienen intactas) ...
function prev(){ if(!tracks.length) return; load(curIdx <= 0 ? tracks.length-1 : curIdx-1); }
function next(){ if(!tracks.length) return; let idx; if(shuffle){ do{ idx=Math.floor(Math.random()*tracks.length); }while(tracks.length>1&&idx===curIdx); } else idx = (curIdx+1) % tracks.length; load(idx); }
function togShuf(){ shuffle = !shuffle; document.getElementById('shuf-btn').classList.toggle('on', shuffle); toast(shuffle ? 'Aleatorio ON' : 'Aleatorio OFF'); }
function togRep(){ repeat = !repeat; document.getElementById('rep-btn').classList.toggle('on', repeat); toast(repeat ? 'Repetir ON' : 'Repetir OFF'); }
function fmt(s){ if(isNaN(s)||!isFinite(s)) return '0:00'; const m=Math.floor(s/60), sc=Math.floor(s%60); return `${m}:${sc.toString().padStart(2,'0')}`; }
function updateSeek(cur, dur){ const pct = dur > 0 ? (cur/dur*100) : 0; document.getElementById('seek-fill').style.width = pct + '%'; document.getElementById('seek-thumb').style.left = pct + '%'; }

vid.addEventListener('timeupdate', ()=>{
  if(vid.duration){
    const v = vid.currentTime, d = vid.duration;
    document.getElementById('seek-input').max = d;
    document.getElementById('seek-input').value = v;
    document.getElementById('cur').textContent = fmt(v);
    document.getElementById('dur').textContent = fmt(d);
    updateSeek(v, d);
    if('mediaSession' in navigator && navigator.mediaSession.setPositionState){
      try { navigator.mediaSession.setPositionState({ duration: d, position: v, playbackRate: 1 }); } catch(e){}
    }
  }
});

vid.addEventListener('ended', ()=>{ if(repeat){ vid.currentTime=0; vid.play(); } else next(); });
vid.addEventListener('play', ()=>setPlay(true));
vid.addEventListener('pause', ()=>setPlay(false));

document.getElementById('seek-input').addEventListener('input', function(){ vid.currentTime = this.value; updateSeek(this.value, vid.duration||0); });
document.getElementById('vol-input').addEventListener('input', function(){ vid.volume = this.value; document.getElementById('vol-fill').style.width = (this.value*100)+'%'; });
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden && audioCtx && audioCtx.state === 'suspended'){ audioCtx.resume(); } });

function renderQueue(){
  const ql = document.getElementById('queue-list'); ql.innerHTML = ''; document.getElementById('queue-count').textContent = tracks.length + ' canciones';
  if(!tracks.length){ ql.innerHTML = '<div id="queue-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="36" height="36"><path d="M9 19V6l12-3v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="15" r="3"/></svg><span>LISTA VACÍA</span></div>'; return; }
  tracks.forEach((t,i) => {
    const d = document.createElement('div'); d.className = 'qi' + (i===curIdx ? ' active' : ''); d.onclick = ()=>load(i);
    d.innerHTML = `<span class="qi-num">${i===curIdx ? '▶' : i+1}</span><div class="qi-info"><div class="qi-name">${t.name}</div><div class="qi-meta">${t.isVideo ? 'VIDEO' : 'AUDIO'}</div></div><button class="qi-del" onclick="delTrack(${i},event)" aria-label="Eliminar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    ql.appendChild(d);
  });
  setTimeout(()=>{ const active = ql.querySelector('.qi.active'); if(active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }, 100);
}

async function delTrack(idx, e){
  e.stopPropagation(); const t = tracks[idx]; URL.revokeObjectURL(t.url); if(t.dbId){ try { await deleteTrackFromDB(t.dbId); } catch(e){} }
  if(idx === curIdx){ vid.pause(); setPlay(false); curIdx = -1; } else if(idx < curIdx) curIdx--;
  tracks.splice(idx, 1);
  if(!tracks.length){ curIdx = -1; document.getElementById('t-name').textContent = 'SIN REPRODUCIR'; document.getElementById('t-sub').textContent = 'Agregá música para empezar'; document.getElementById('mini-name').textContent = 'Sin reproducir'; document.getElementById('seek-input').value = 0; updateSeek(0,0); } else if(curIdx === -1) load(0);
  renderQueue(); toast('Eliminado');
}

function showPlayer(){ document.getElementById('view-queue').classList.remove('visible'); document.getElementById('nav-player').classList.add('active'); document.getElementById('nav-queue').classList.remove('active'); }
function showQueue(){ renderQueue(); document.getElementById('view-queue').classList.add('visible'); document.getElementById('nav-player').classList.remove('active'); document.getElementById('nav-queue').classList.add('active'); }
function showLoading(v){ document.getElementById('loading').classList.toggle('visible', v); }
let toastTimer; function toast(msg){ const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove('show'), 2000); }

window.addEventListener('load', async ()=>{
  await bootDB();
  setTimeout(()=>{ document.getElementById('splash').classList.add('hide'); }, 1400);
});

async function requestWakeLock(){ if('wakeLock' in navigator){ try { await navigator.wakeLock.request('screen'); } catch(e){} } }
vid.addEventListener('play', requestWakeLock);

// ── ACTIVACIÓN SERVICE WORKER (PWA OFFLINE) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Modo Offline PWA activado', reg))
      .catch(err => console.error('Error al registrar Service Worker', err));
  });
}
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registrado con éxito', reg))
        .catch(err => console.error('Error al registrar el Service Worker', err));
    });
  }
</script>
</body>
</html>
